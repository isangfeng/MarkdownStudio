name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    name: Build macOS release
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Test
        run: swift test

      - name: Build DMG
        env:
          MARKDOWNSTUDIO_VERSION: ${{ github.ref_name }}
          MARKDOWNSTUDIO_BUILD: ${{ github.run_number }}
        run: |
          export MARKDOWNSTUDIO_VERSION="${MARKDOWNSTUDIO_VERSION#v}"
          ./scripts/make-release-dmg.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: MarkdownStudio ${{ github.ref_name }}
          body: Download MarkdownStudio.dmg, open it, and drag MarkdownStudio.app to Applications.
          files: .build/dist/MarkdownStudio.dmg
